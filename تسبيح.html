<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>جهاز التسبيح</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
body {
  font-family: Arial, sans-serif;
  background: #f0f0f0;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  touch-action: manipulation;
  position: relative;
}
.top-buttons {
  position: absolute;
  top: 15px;
  right: 15px;
  display: flex;
  gap: 10px;
  z-index: 20;
}
.top-buttons button {
  padding: 10px 16px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 15px;
  font-weight: bold;
  box-shadow: 0 3px 6px rgba(0,0,0,0.3);
  transition: 0.2s;
}
#resetBtn { background-color: #ff6b6b; color: white; }
#darkModeBtn { background-color: #4a90e2; color: white; }
#moveBtn { background-color: #f39c12; color: white; }

.device {
  background: #2c3e50;
  border-radius: 45% / 40%;
  width: 280px;
  height: 400px;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  box-shadow: 0 6px 15px rgba(0, 0, 0, 0.35);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding-top: 40px;
  transition: top 0.2s;
  z-index: 10;
}
.screen {
  background: #2ecc71;
  color: black;
  font-size: 42px;
  font-weight: bold;
  width: 160px;
  height: 65px;
  border-radius: 8px;
  display: flex;
  justify-content: center;
  align-items: center;
  margin-bottom: 40px;
  box-shadow: inset 0 2px 6px rgba(0,0,0,0.5);
}
.big-button {
  background: radial-gradient(circle, #cccccc, #999999);
  border-radius: 50%;
  width: 140px;
  height: 140px;
  border: none;
  cursor: pointer;
  box-shadow: 0 6px 12px rgba(0,0,0,0.5);
  transition: transform 0.1s;
}
.big-button:active { transform: scale(0.95); }

body.dark { background: #1a1a1a; color: white; }
body.dark .device { background: #111; }
body.dark .screen { background: #27ae60; color: #fff; }

.dialog {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: #fff;
  border-radius: 15px;
  padding: 20px 25px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.4);
  display: none;
  flex-direction: column;
  align-items: center;
  text-align: center;
  z-index: 50;
}
.dialog p {
  margin-bottom: 15px;
  font-size: 18px;
  font-weight: bold;
}
.dialog button {
  margin: 6px;
  padding: 10px 20px;
  font-size: 15px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}
#moveDialog .arrow-buttons {
  display: flex;
  gap: 15px;
  margin-bottom: 15px;
}
#confirmReset { background:#ff6b6b; color:#fff; }
#cancelReset { background:#777; color:#fff; }
#savePosition { background:#2ecc71; color:#fff; }
#closeDialog { background:#555; color:#fff; }
</style>
</head>
<body>

<div class="top-buttons">
  <button id="darkModeBtn">🌙</button>
  <button id="resetBtn">🔄</button>
  <button id="moveBtn">📌 تحريك الجهاز</button>
</div>

<div class="device" id="device">
  <div class="screen" id="counter">000</div>
  <button class="big-button" id="bigBtn"></button>
</div>

<!-- نافذة تحريك الجهاز -->
<div id="moveDialog" class="dialog">
  <p>اختر تحريك الجهاز:</p>
  <div class="arrow-buttons">
    <button id="upBtn">⬆️ رفع</button>
    <button id="downBtn">⬇️ إنزال</button>
  </div>
  <button id="savePosition">💾 حفظ الموقع</button>
  <button id="closeDialog">❌ إغلاق</button>
</div>

<!-- نافذة إعادة التعيين -->
<div id="resetDialog" class="dialog">
  <p>هل تريد إعادة التعيين للصفر؟</p>
  <button id="confirmReset">✔ نعم</button>
  <button id="cancelReset">❌ إلغاء</button>
</div>

<script>
const counterDisplay = document.getElementById("counter");
const bigBtn = document.getElementById("bigBtn");
const resetBtn = document.getElementById("resetBtn");
const darkModeBtn = document.getElementById("darkModeBtn");
const device = document.getElementById("device");
const moveBtn = document.getElementById("moveBtn");
const moveDialog = document.getElementById("moveDialog");
const upBtn = document.getElementById("upBtn");
const downBtn = document.getElementById("downBtn");
const savePosition = document.getElementById("savePosition");
const closeDialog = document.getElementById("closeDialog");
const resetDialog = document.getElementById("resetDialog");
const confirmReset = document.getElementById("confirmReset");
const cancelReset = document.getElementById("cancelReset");

let count = parseInt(localStorage.getItem("tasbeehCount")) || 0;

// وضع الداكن
if (localStorage.getItem("darkMode") === "true") {
  document.body.classList.add("dark");
  darkModeBtn.textContent = "☀️";
} else {
  darkModeBtn.textContent = "🌙";
}

// تحميل موقع الجهاز
let savedTop = localStorage.getItem("deviceTop");
if (savedTop) device.style.top = savedTop;

updateDisplay();

// زر التسبيح
bigBtn.addEventListener("click", () => {
  count++;
  saveCount();
  updateDisplay();
  if (count % 100 === 0) {
    showPopup(`🌹 وصلت ${count} تسبيحة! الله يتقبل منك 🙏🏻`);
  }
});

// زر إعادة التعيين
resetBtn.addEventListener("click", () => {
  resetDialog.style.display = "flex";
});
confirmReset.addEventListener("click", () => {
  count = 0;
  saveCount();
  updateDisplay();
  resetDialog.style.display = "none";
});
cancelReset.addEventListener("click", () => {
  resetDialog.style.display = "none";
});

// زر الوضع الداكن
darkModeBtn.addEventListener("click", () => {
  moveDialog.style.display = "none";
  document.body.classList.toggle("dark");
  const isDark = document.body.classList.contains("dark");
  localStorage.setItem("darkMode", isDark);
  darkModeBtn.textContent = isDark ? "☀️" : "🌙";
});

// تحريك الجهاز
moveBtn.addEventListener("click", () => moveDialog.style.display = "flex");
upBtn.addEventListener("click", () => {
  let currentTop = parseFloat(getComputedStyle(device).top);
  device.style.top = (currentTop - 10) + "px";
});
downBtn.addEventListener("click", () => {
  let currentTop = parseFloat(getComputedStyle(device).top);
  device.style.top = (currentTop + 10) + "px";
});
savePosition.addEventListener("click", () => {
  localStorage.setItem("deviceTop", device.style.top);
  moveDialog.style.display = "none";
  showPopup("تم حفظ موقع الجهاز ✅");
});
closeDialog.addEventListener("click", () => moveDialog.style.display = "none");

// تحديث الشاشة
function updateDisplay() {
  counterDisplay.textContent = count.toString().padStart(3, "0");
}
function saveCount() {
  localStorage.setItem("tasbeehCount", count);
}

// نافذة منبثقة صغيرة
function showPopup(msg) {
  const popup = document.createElement("div");
  popup.textContent = msg;
  popup.style.position = "fixed";
  popup.style.bottom = "20px";
  popup.style.left = "50%";
  popup.style.transform = "translateX(-50%)";
  popup.style.background = "#333";
  popup.style.color = "#fff";
  popup.style.padding = "10px 20px";
  popup.style.borderRadius = "8px";
  popup.style.fontSize = "14px";
  popup.style.boxShadow = "0 3px 8px rgba(0,0,0,0.4)";
  document.body.appendChild(popup);
  setTimeout(() => popup.remove(), 2000);
}

// منع نسخ/لصق
["contextmenu","copy","cut","paste"].forEach(evt => 
  document.addEventListener(evt, e => e.preventDefault())
);
</script>
</body>
</html>
